<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="980"
  height="680"
  viewBox="0 0 980 680"
  version="1.1"
>
  <title>RoastMaster Stripboard Interface Board Layout</title>
  <desc>
    Component-side layout for a 60x40 stripboard (copper strips run left-to-right).
    Coordinates: Row 1 at top, Col 1 at left. Pitch = 12px.
    Red circles mark strip cuts (on copper side). Blue lines mark wire links (component side).
  </desc>

  <defs>
    <!-- Grid pitch -->
    <style>
      .label { font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #1f2937; }
      .small { font-size: 11px; fill: #374151; }
      .tiny { font-size: 10px; fill: #4b5563; }
      .hdr  { font: 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; font-weight: 700; fill: #111827; }
      .note { font: 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #6b7280; }
    </style>

    <!-- Repeating hole pattern -->
    <pattern id="holes" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2.1" fill="none" stroke="#9ca3af" stroke-width="1"/>
    </pattern>

    <!-- Resistor symbol -->
    <g id="resistor" stroke="#111827" stroke-width="2" fill="none">
      <line x1="0" y1="0" x2="6" y2="0"/>
      <polyline points="6,0 10,-4 14,4 18,-4 22,4 26,-4 30,4 34,0"/>
      <line x1="34" y1="0" x2="40" y2="0"/>
    </g>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="980" height="680" fill="#ffffff"/>

  <!-- Constants (visually): origin = (x0=60, y0=60), pitch=12; board rect = (54,54) w=720 h=480 -->
  <text class="hdr" x="54" y="28">RoastMaster Stripboard Interface Board</text>
  <text class="note" x="54" y="46">60 columns × 40 rows, 0.1&quot; pitch. Copper strips run left → right (horizontal).</text>

  <!-- Board outline -->
  <rect x="54" y="54" width="720" height="480" rx="8" ry="8" fill="#f9fafb" stroke="#111827" stroke-width="2"/>

  <!-- Copper strips (faint, to show where cuts matter) -->
  <g opacity="0.35" stroke="#b45309" stroke-width="3">
    <!-- 40 horizontal strips, centered on hole rows -->
    <!-- y(row) = 60 + (row-1)*12 -->
    <line x1="54" y1="60" x2="774" y2="60"/>
    <line x1="54" y1="72" x2="774" y2="72"/>
    <line x1="54" y1="84" x2="774" y2="84"/>
    <line x1="54" y1="96" x2="774" y2="96"/>
    <line x1="54" y1="108" x2="774" y2="108"/>
    <line x1="54" y1="120" x2="774" y2="120"/>
    <line x1="54" y1="132" x2="774" y2="132"/>
    <line x1="54" y1="144" x2="774" y2="144"/>
    <line x1="54" y1="156" x2="774" y2="156"/>
    <line x1="54" y1="168" x2="774" y2="168"/>
    <line x1="54" y1="180" x2="774" y2="180"/>
    <line x1="54" y1="192" x2="774" y2="192"/>
    <line x1="54" y1="204" x2="774" y2="204"/>
    <line x1="54" y1="216" x2="774" y2="216"/>
    <line x1="54" y1="228" x2="774" y2="228"/>
    <line x1="54" y1="240" x2="774" y2="240"/>
    <line x1="54" y1="252" x2="774" y2="252"/>
    <line x1="54" y1="264" x2="774" y2="264"/>
    <line x1="54" y1="276" x2="774" y2="276"/>
    <line x1="54" y1="288" x2="774" y2="288"/>
    <line x1="54" y1="300" x2="774" y2="300"/>
    <line x1="54" y1="312" x2="774" y2="312"/>
    <line x1="54" y1="324" x2="774" y2="324"/>
    <line x1="54" y1="336" x2="774" y2="336"/>
    <line x1="54" y1="348" x2="774" y2="348"/>
    <line x1="54" y1="360" x2="774" y2="360"/>
    <line x1="54" y1="372" x2="774" y2="372"/>
    <line x1="54" y1="384" x2="774" y2="384"/>
    <line x1="54" y1="396" x2="774" y2="396"/>
    <line x1="54" y1="408" x2="774" y2="408"/>
    <line x1="54" y1="420" x2="774" y2="420"/>
    <line x1="54" y1="432" x2="774" y2="432"/>
    <line x1="54" y1="444" x2="774" y2="444"/>
    <line x1="54" y1="456" x2="774" y2="456"/>
    <line x1="54" y1="468" x2="774" y2="468"/>
    <line x1="54" y1="480" x2="774" y2="480"/>
    <line x1="54" y1="492" x2="774" y2="492"/>
    <line x1="54" y1="504" x2="774" y2="504"/>
    <line x1="54" y1="516" x2="774" y2="516"/>
    <line x1="54" y1="528" x2="774" y2="528"/>
  </g>

  <!-- Hole grid -->
  <rect x="54" y="54" width="720" height="480" fill="url(#holes)" opacity="0.9"/>

  <!-- Axis labels -->
  <g class="tiny">
    <!-- Column labels every 5 -->
    <text x="60" y="52" text-anchor="middle">1</text>
    <text x="120" y="52" text-anchor="middle">6</text>
    <text x="180" y="52" text-anchor="middle">11</text>
    <text x="240" y="52" text-anchor="middle">16</text>
    <text x="300" y="52" text-anchor="middle">21</text>
    <text x="360" y="52" text-anchor="middle">26</text>
    <text x="420" y="52" text-anchor="middle">31</text>
    <text x="480" y="52" text-anchor="middle">36</text>
    <text x="540" y="52" text-anchor="middle">41</text>
    <text x="600" y="52" text-anchor="middle">46</text>
    <text x="660" y="52" text-anchor="middle">51</text>
    <text x="720" y="52" text-anchor="middle">56</text>
    <!-- Row labels every 5 -->
    <text x="44" y="64" text-anchor="end">1</text>
    <text x="44" y="124" text-anchor="end">6</text>
    <text x="44" y="184" text-anchor="end">11</text>
    <text x="44" y="244" text-anchor="end">16</text>
    <text x="44" y="304" text-anchor="end">21</text>
    <text x="44" y="364" text-anchor="end">26</text>
    <text x="44" y="424" text-anchor="end">31</text>
    <text x="44" y="484" text-anchor="end">36</text>
    <text x="44" y="532" text-anchor="end">40</text>
  </g>

  <!-- Headers (Pi side) -->
  <g>
    <!-- J_PI_MAIN at col 2 rows 1-5: x=72, y=60..108 -->
    <rect x="64" y="54" width="16" height="66" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <text class="small" x="84" y="48" text-anchor="start">J_PI_MAIN</text>
    <text class="tiny" x="84" y="64" text-anchor="start">Row1 3V3</text>
    <text class="tiny" x="84" y="76" text-anchor="start">Row2 5V</text>
    <text class="tiny" x="84" y="88" text-anchor="start">Row3 GND</text>
    <text class="tiny" x="84" y="100" text-anchor="start">Row4 SDA</text>
    <text class="tiny" x="84" y="112" text-anchor="start">Row5 SCL</text>

    <!-- J_PI_GPIO at col 2 rows 10-23 -->
    <rect x="64" y="162" width="16" height="168" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <text class="small" x="84" y="158" text-anchor="start">J_PI_GPIO</text>
    <text class="tiny" x="84" y="172" text-anchor="start">Rows10–23</text>

    <!-- J_PI_SPI at col 2 rows 26-29 -->
    <rect x="64" y="354" width="16" height="48" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <text class="small" x="84" y="350" text-anchor="start">J_PI_SPI</text>
    <text class="tiny" x="84" y="366" text-anchor="start">Row26 CE0</text>
    <text class="tiny" x="84" y="378" text-anchor="start">Row27 MOSI</text>
    <text class="tiny" x="84" y="390" text-anchor="start">Row28 MISO</text>
    <text class="tiny" x="84" y="402" text-anchor="start">Row29 SCLK</text>
  </g>

  <!-- Headers (Panel side) -->
  <g>
    <!-- J_PANEL_PWR at col 59 rows 1-3: x=768, y=60..84 -->
    <rect x="760" y="54" width="16" height="42" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
    <text class="small" x="754" y="48" text-anchor="end">J_PANEL_PWR</text>
    <text class="tiny" x="754" y="64" text-anchor="end">Row1 3V3</text>
    <text class="tiny" x="754" y="76" text-anchor="end">Row2 5V</text>
    <text class="tiny" x="754" y="88" text-anchor="end">Row3 GND</text>

    <!-- J_PANEL_GPIO at col 59 rows 10-23 -->
    <rect x="760" y="162" width="16" height="168" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
    <text class="small" x="754" y="158" text-anchor="end">J_PANEL_GPIO</text>
    <text class="tiny" x="754" y="172" text-anchor="end">Rows10–23</text>

    <!-- J_PANEL_POTS at col 59 rows 30-32 -->
    <rect x="760" y="402" width="16" height="42" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
    <text class="small" x="754" y="398" text-anchor="end">J_PANEL_POTS</text>
    <text class="tiny" x="754" y="412" text-anchor="end">Row30 DRUM</text>
    <text class="tiny" x="754" y="424" text-anchor="end">Row31 AIR</text>
    <text class="tiny" x="754" y="436" text-anchor="end">Row32 BURN</text>

    <!-- J_PANEL_PWM at col 59 rows 34-40 -->
    <rect x="760" y="450" width="16" height="84" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
    <text class="small" x="754" y="446" text-anchor="end">J_PANEL_PWM</text>
    <text class="tiny" x="754" y="460" text-anchor="end">Rows34–40</text>
  </g>

  <!-- Headers (PCA9685 connections) -->
  <g>
    <!-- J_PCA_I2C at col 20 rows 1-5: x=288 -->
    <rect x="280" y="54" width="16" height="66" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
    <text class="small" x="300" y="48" text-anchor="start">J_PCA_I2C</text>
    <text class="tiny" x="300" y="64" text-anchor="start">Row1 VCC</text>
    <text class="tiny" x="300" y="76" text-anchor="start">Row2 V+</text>
    <text class="tiny" x="300" y="88" text-anchor="start">Row3 GND</text>
    <text class="tiny" x="300" y="100" text-anchor="start">Row4 SDA</text>
    <text class="tiny" x="300" y="112" text-anchor="start">Row5 SCL</text>

    <!-- J_PCA_PWM at col 20 rows 34-40 -->
    <rect x="280" y="450" width="16" height="84" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
    <text class="small" x="300" y="446" text-anchor="start">J_PCA_PWM</text>
    <text class="tiny" x="300" y="460" text-anchor="start">PWM0–PWM6</text>
  </g>

  <!-- MCP3008 socket U1 -->
  <g>
    <!-- Body spanning rows 25-32, cols approx 24..29 -->
    <rect x="330" y="336" width="72" height="108" fill="#f3f4f6" stroke="#111827" stroke-width="2"/>
    <!-- Notch (bottom) -->
    <path d="M 354 444 C 360 434, 372 434, 378 444" fill="none" stroke="#111827" stroke-width="2"/>
    <text class="small" x="366" y="330" text-anchor="middle">U1 MCP3008</text>
    <text class="tiny" x="366" y="460" text-anchor="middle">Pin 1 at (Row32, Col28)</text>
    <!-- Pin 1 marker -->
    <!-- Row32 Col28 => x=384,y=432 -->
    <circle cx="384" cy="432" r="3" fill="#ef4444"/>
  </g>

  <!-- Strip cuts (red circles) -->
  <g fill="none" stroke="#dc2626" stroke-width="3">
    <!-- MCP3008 isolation cuts at Col 27, Rows 25-32: x(col27)=372 -->
    <circle cx="372" cy="348" r="6"/>
    <circle cx="372" cy="360" r="6"/>
    <circle cx="372" cy="372" r="6"/>
    <circle cx="372" cy="384" r="6"/>
    <circle cx="372" cy="396" r="6"/>
    <circle cx="372" cy="408" r="6"/>
    <circle cx="372" cy="420" r="6"/>
    <circle cx="372" cy="432" r="6"/>

    <!-- PWM cuts at Col 50, Rows 34-40: x(col50)=648 -->
    <circle cx="648" cy="456" r="6"/>
    <circle cx="648" cy="468" r="6"/>
    <circle cx="648" cy="480" r="6"/>
    <circle cx="648" cy="492" r="6"/>
    <circle cx="648" cy="504" r="6"/>
    <circle cx="648" cy="516" r="6"/>
    <circle cx="648" cy="528" r="6"/>
  </g>
  <text class="tiny" x="666" y="448">Red = cut strip (copper side)</text>

  <!-- Wire links (blue) -->
  <g stroke="#2563eb" stroke-width="3" fill="none">
    <!-- Row1 Col10 (x=168,y=60) to Row32 Col10 (x=168,y=432) -->
    <line x1="168" y1="60" x2="168" y2="432"/>
    <!-- Row3 Col11 (x=180,y=84) to Row25 Col11 (x=180,y=348) -->
    <line x1="180" y1="84" x2="180" y2="348"/>
    <!-- Row3 Col12 (x=192,y=84) to Row30 Col12 (x=192,y=408) -->
    <line x1="192" y1="84" x2="192" y2="408"/>
    <!-- VDD<->VREF short link: Row31 Col25 (x=348,y=420) to Row32 Col25 (x=348,y=432) -->
    <line x1="348" y1="420" x2="348" y2="432"/>
  </g>
  <text class="tiny" x="210" y="96">Blue = wire link (component side)</text>

  <!-- Decoupling capacitor C1 -->
  <g>
    <!-- Between Row32 Col24 (x=336,y=432) and Row30 Col24 (x=336,y=408) -->
    <rect x="316" y="414" width="16" height="16" fill="#22c55e" stroke="#14532d" stroke-width="2"/>
    <text class="tiny" x="324" y="408" text-anchor="middle">C1 0.1µF</text>
  </g>

  <!-- PWM series resistors -->
  <g>
    <!-- Resistors between Col48 (x=624) and Col52 (x=672) -->
    <g transform="translate(624,456)"><use href="#resistor"/></g>
    <g transform="translate(624,468)"><use href="#resistor"/></g>
    <g transform="translate(624,480)"><use href="#resistor"/></g>
    <g transform="translate(624,492)"><use href="#resistor"/></g>
    <g transform="translate(624,504)"><use href="#resistor"/></g>
    <g transform="translate(624,516)"><use href="#resistor"/></g>
    <g transform="translate(624,528)"><use href="#resistor"/></g>
    <text class="tiny" x="624" y="444">R (series)</text>
  </g>

  <!-- Quick legend -->
  <g>
    <rect x="804" y="64" width="154" height="110" rx="8" ry="8" fill="#f9fafb" stroke="#111827" stroke-width="1"/>
    <text class="small" x="816" y="86">Legend</text>
    <circle cx="822" cy="104" r="6" fill="none" stroke="#dc2626" stroke-width="3"/>
    <text class="tiny" x="836" y="108">Strip cut (copper)</text>
    <line x1="816" y1="124" x2="834" y2="124" stroke="#2563eb" stroke-width="3"/>
    <text class="tiny" x="836" y="128">Wire link (component)</text>
    <rect x="816" y="140" width="16" height="16" fill="#22c55e" stroke="#14532d" stroke-width="2"/>
    <text class="tiny" x="836" y="152">Decoupling cap</text>
  </g>

  <!-- Footer note -->
  <text class="note" x="54" y="640">
    Tip: Perform all strip cuts first, then continuity-test each rail/net before powering the Pi.
  </text>
</svg>
